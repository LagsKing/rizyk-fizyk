<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ryzyk Fizyk AI</title>
    
    <!-- Meta tagi dla aplikacji mobilnej (PWA) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3407/3407024.png">

    <style>
        :root {
            --bg-color: #0b0b0e;
            --card-bg: #16161a;
            --text-main: #ffffff;
            --text-muted: #88888e;
            --accent: #a855f7;
            --btn-sec: #2d2d35;
            --danger: #ef4444;
        }
        
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; padding: 20px; 
            display: flex; flex-direction: column; align-items: center;
        }

        h1 { text-align: center; font-size: 24px; margin-bottom: 25px; letter-spacing: -1px; }

        .setup-container, .flashcard {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #222;
            box-sizing: border-box;
        }

        label { display: block; font-size: 13px; color: var(--text-muted); margin: 15px 0 5px 0; text-transform: uppercase; font-weight: bold; }
        input { 
            width: 100%; padding: 14px; background: #222; border: 1px solid #333; 
            color: white; border-radius: 12px; font-size: 16px; box-sizing: border-box;
        }

        button.btn {
            width: 100%; padding: 16px; margin-top: 20px;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            color: white; font-weight: 800; border: none; border-radius: 14px;
            cursor: pointer; text-transform: uppercase; transition: 0.2s;
        }
        button.btn:active { transform: scale(0.97); }
        .btn-secondary { background: var(--btn-sec); color: #ccc; margin-top: 10px; border: 1px solid #3f3f46; cursor: pointer; border-radius: 12px; padding: 12px; font-weight: bold; }
        .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); font-size: 12px; padding: 8px; margin-top: 20px; width: auto; border-radius: 8px; cursor: pointer; }

        /* --- EKRAN ŁADOWANIA --- */
        #loader { display: none; margin-top: 40px; width: 100%; max-width: 400px; }
        .loading-text { text-align: center; color: var(--accent); font-weight: bold; font-size: 14px; margin-bottom: 15px; min-height: 40px; animation: pulse 1.5s infinite ease-in-out; }
        .progress-bar-container { width: 100%; height: 12px; background: #222; border-radius: 10px; overflow: hidden; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); border: 1px solid #333; }
        .progress-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #6366f1, #a855f7); border-radius: 10px; transition: width 0.5s ease; box-shadow: 0 0 10px rgba(168, 85, 247, 0.5); }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        /* ----------------------- */
        
        #game-container { display: none; width: 100%; max-width: 400px; }
        .progress-counter { text-align: center; color: var(--text-muted); font-size: 12px; margin-bottom: 12px; font-weight: bold; }

        .flashcard { border-top: 6px solid var(--accent); animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .category-header { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .category-name { font-size: 14px; font-weight: 900; text-transform: uppercase; letter-spacing: 1.5px; }

        /* --- OBRAZEK PYTANIA Z PLACEHOLDEREM --- */
        .img-wrapper {
            position: relative;
            width: 100%;
            height: 200px;
            border-radius: 12px;
            margin-bottom: 20px;
            background: #1a1a20;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        
        .img-loading-text {
            color: var(--accent);
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            animation: pulse 1.5s infinite;
            position: absolute;
            z-index: 1;
            text-align: center;
        }

        .question-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: relative;
            z-index: 2;
            opacity: 0; /* Startowo niewidoczny */
            transition: opacity 0.6s ease-in-out;
        }

        .question { font-size: 21px; font-weight: 700; line-height: 1.4; margin-bottom: 25px; }
        .answer-section { display: none; border-top: 1px solid #333; padding-top: 20px; margin-top: 10px; }
        .answer-text { font-size: 36px; font-weight: 900; color: #fff; text-align: center; }
        .fun-fact { font-size: 14px; color: var(--text-muted); font-style: italic; text-align: center; margin: 15px 0; line-height: 1.5; }
        .nav-group { display: flex; gap: 10px; flex-direction: column; }
        .history-info { font-size: 11px; color: var(--text-muted); text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

    <h1>🎮 RYZYK FIZYK AI</h1>

    <div class="setup-container" id="setup-screen">
        <label>TEMATY (po przecinku):</label>
        <input type="text" id="cats" value="Polskie absurdy, Zwierzęta, Kosmos">
        <label>PYTAŃ NA KATEGORIĘ:</label>
        <input type="number" id="count" value="3" min="1">
        
        <button class="btn" onclick="generateQuestions()">Generuj Grę</button>
        
        <div style="text-align: center;">
            <div class="history-info" id="history-stats">Pamięć: 0 użytych pytań.</div>
            <button class="btn-danger" onclick="clearHistory()">🗑️ Wyczyść pamięć pytań</button>
        </div>
    </div>

    <!-- Pasek Ładowania -->
    <div id="loader">
        <div id="loading-msg" class="loading-text">✨ Budzę sztuczną inteligencję...</div>
        <div class="progress-bar-container">
            <div id="progress-fill" class="progress-bar-fill"></div>
        </div>
    </div>

    <div id="game-container">
        <div class="progress-counter" id="progress"></div>
        <div id="card-slot"></div>
    </div>

    <script>
        const WEBHOOK_URL = "https://ryzyk-fizyk.duckdns.org/webhook/ryzyk";
        let allQuestions = [];
        let currentIndex = 0;

        let loadingTextInterval;
        let progressInterval;
        const funnyMessages = [
            "Przeszukuję czeluści internetu...",
            "Wyciągam najbardziej absurdalne liczby...",
            "Aplikuję dawkę jadowitego sarkazmu...",
            "Generuję wizualizacje Twojej porażki...",
            "To trwa dłużej niż remont łazienki...",
            "Mieszam piksele z cyberpunkiem..."
        ];

        updateHistoryUI();

        function getHistory() { return JSON.parse(localStorage.getItem('ryzyk_history') || '[]'); }
        function clearHistory() {
            localStorage.removeItem('ryzyk_history');
            updateHistoryUI();
            alert("Pamięć wyczyszczona. AI może znów losować wszystkie pytania.");
        }
        function updateHistoryUI() {
            document.getElementById('history-stats').innerText = `Pamięć: zapamiętano ${getHistory().length} starych pytań.`;
        }

        function startLoadingUI() {
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            
            const msgEl = document.getElementById('loading-msg');
            const fillEl = document.getElementById('progress-fill');
            
            let msgIdx = 0; let currentWidth = 0;
            msgEl.innerText = "✨ " + funnyMessages[0];
            fillEl.style.width = "0%";

            loadingTextInterval = setInterval(() => {
                msgIdx = (msgIdx + 1) % funnyMessages.length;
                msgEl.innerText = "✨ " + funnyMessages[msgIdx];
            }, 3000);

            progressInterval = setInterval(() => {
                if (currentWidth < 90) {
                    currentWidth += Math.random() * (90 - currentWidth) * 0.1 + 1;
                    fillEl.style.width = currentWidth + "%";
                }
            }, 500);
        }

        function stopLoadingUI(success) {
            clearInterval(loadingTextInterval);
            clearInterval(progressInterval);
            if (success) {
                document.getElementById('progress-fill').style.width = "100%";
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('game-container').style.display = 'block';
                    renderCard();
                }, 400);
            } else {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('setup-screen').style.display = 'block';
            }
        }

        async function generateQuestions() {
            startLoadingUI();
            const history = getHistory();

            try {
                const categories = document.getElementById('cats').value;
                const count = document.getElementById('count').value;

                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ categories, count, blacklist: history })
                });

                if (!response.ok) throw new Error('Błąd HTTP: ' + response.status);

                const rawData = await response.text();
                const cleanData = rawData.replace(/```json/gi, '').replace(/```/g, '').trim();
                let parsedData = JSON.parse(cleanData);
                
                // SUPER ODPORNE ROZPAKOWYWANIE DANYCH Z N8N
                let extractedText = null;
                if (Array.isArray(parsedData) && parsedData.length === 1 && typeof parsedData[0] === 'object') {
                    extractedText = parsedData[0].text || parsedData[0].output;
                } else if (parsedData && !Array.isArray(parsedData) && typeof parsedData === 'object') {
                    extractedText = parsedData.text || parsedData.output;
                }

                if (extractedText) {
                    parsedData = JSON.parse(extractedText.replace(/```json/gi, '').replace(/```/g, '').trim());
                }

                allQuestions = [];
                let newQuestionsText = []; 

                parsedData.forEach(kat => {
                    kat.pytania.forEach(p => {
                        // Magia Pollinations.ai - generowanie URL na podstawie promptu AI
                        let promptText = p.img_prompt || (kat.kategoria + " concept art, dark cinematic, neon lighting");
                        const randomSeed = Math.floor(Math.random() * 999999);
                        
                        let imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(promptText)}?nologo=true&width=400&height=250&seed=${randomSeed}`;

                        allQuestions.push({
                            category: kat.kategoria,
                            kolor: kat.kolor || "#a855f7",
                            emoji: kat.emoji || "🎲",
                            q: p.q, a: p.a, f: p.f, img: imageUrl
                        });
                        newQuestionsText.push(p.q); 
                    });
                });

                const updatedHistory = [...new Set([...history, ...newQuestionsText])].slice(-50);
                localStorage.setItem('ryzyk_history', JSON.stringify(updatedHistory));
                updateHistoryUI();

                allQuestions.sort(() => Math.random() - 0.5);
                currentIndex = 0;

                stopLoadingUI(true);

            } catch (error) {
                console.error("Szczegóły błędu:", error);
                alert("Błąd połączenia! Serwer wymiękł.");
                stopLoadingUI(false);
            }
        }

        function renderCard() {
            const slot = document.getElementById('card-slot');
            const q = allQuestions[currentIndex];
            const isLast = currentIndex === allQuestions.length - 1;

            document.getElementById('progress').innerText = `PYTANIE ${currentIndex + 1} Z ${allQuestions.length}`;

            // Pusty tag img na start, bez src. Dodałem crossorigin i referrerpolicy!
            let imgHTML = `
                <div class="img-wrapper">
                    <div id="img-loader-text" class="img-loading-text">🖼️ Generowanie obrazu...</div>
                    <img id="current-q-img" class="question-image" alt="AI Image" crossorigin="anonymous" referrerpolicy="no-referrer">
                </div>
            `;

            slot.innerHTML = `
                <div class="flashcard" style="border-top-color: ${q.kolor}">
                    <div class="category-header">
                        <span>${q.emoji}</span>
                        <span class="category-name" style="color: ${q.kolor}">${q.category}</span>
                    </div>
                    
                    ${imgHTML}
                    
                    <p class="question">${q.q}</p>
                    <button class="btn" id="rev-btn" onclick="showAnswer()">Pokaż odpowiedź</button>
                    
                    <div class="answer-section" id="ans-sec">
                        <div class="answer-text">${q.a}</div>
                        <p class="fun-fact">${q.f}</p>
                        <div class="nav-group">
                            <button class="btn" onclick="next()">
                                ${isLast ? "Zakończ i wróć" : "Dalej"}
                            </button>
                            <button class="btn-secondary" onclick="prev()">⬅ Wstecz</button>
                        </div>
                    </div>
                </div>
            `;

            // CAŁA MAGIA BEZPIECZEŃSTWA ŁADOWANIA OBRAZKA I RETRY
            const qImg = document.getElementById('current-q-img');
            const qLoader = document.getElementById('img-loader-text');
            
            if (qImg) {
                let retries = 0;
                const maxRetries = 2; // Maksymalnie 2 próby ratunkowe

                const attemptLoad = (imgUrl) => {
                    console.log("Próbuję załadować obraz z URL:", imgUrl);
                    qImg.src = imgUrl;
                };

                // Przypisujemy zachowania ZANIM zlecimy pobieranie
                qImg.onload = () => {
                    qImg.style.opacity = '1';
                    if (qLoader) qLoader.style.display = 'none';
                };
                
                qImg.onerror = () => {
                    if (retries < maxRetries) {
                        retries++;
                        console.warn(`Błąd serwera Pollinations. Ponawiam próbę ${retries}/${maxRetries}...`);
                        if (qLoader) {
                            qLoader.innerText = `🔄 Ponawianie (${retries}/${maxRetries})...`;
                        }
                        
                        // Zmieniamy seed w linku, żeby ominąć zablokowany węzeł u nich na serwerach
                        const newSeed = Math.floor(Math.random() * 999999);
                        const newUrl = q.img.replace(/seed=\d+/, `seed=${newSeed}`);
                        
                        // Czekamy 1.5 sekundy, żeby serwer Pollinations odetchnął
                        setTimeout(() => attemptLoad(newUrl), 1500);
                    } else {
                        console.error("Wystąpił ostateczny błąd podczas ładowania obrazka (502)!");
                        if (qLoader) {
                            qLoader.innerText = "❌ Serwer obrazów przeciążony";
                            qLoader.style.animation = "none";
                            qLoader.style.color = "var(--danger)";
                        }
                    }
                };

                // Pierwsza próba pobrania
                attemptLoad(q.img);
            }
        }

        function showAnswer() {
            document.getElementById('rev-btn').style.display = 'none';
            document.getElementById('ans-sec').style.display = 'block';
        }

        function next() {
            if (++currentIndex < allQuestions.length) renderCard();
            else {
                document.getElementById('game-container').style.display = 'none';
                document.getElementById('setup-screen').style.display = 'block';
            }
        }

        function prev() {
            if (currentIndex > 0) { currentIndex--; renderCard(); showAnswer(); }
        }
    </script>
</body>
</html>
